<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>{{ page.title }}</title>
<style>
:root {
  --bg: #0d1117;
  --card-bg: #161b22;
  --border: #30363d;
  --text: #e6edf3;
  --muted: #8b949e;
  --accent-green: #3fb950;
  --accent-blue: #58a6ff;
  --accent-purple: #bc8cff;
  --accent-orange: #d29922;
  --accent-red: #f85149;
  --accent-cyan: #39d2c0;
  --accent-pink: #f778ba;
  --gold: #ffd700;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; padding: 2rem; }
@media (max-width: 700px) { body { padding: 1rem; } }

/* ── Index ─────────────────────────────── */
.index-page { min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; }
.index-page h1 { font-size: 2.4rem; margin-bottom: .5rem; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.index-page .subtitle { color: var(--muted); margin-bottom: 3rem; font-size: 1.05rem; }

/* ── Coversheet (title card at top) ───── */
.coversheet { text-align: center; margin-bottom: 3rem; padding: 2.5rem; background: linear-gradient(135deg, #1a1e2e, var(--bg)); border-radius: 16px; border: 1px solid var(--border); }
.coversheet h1 { font-size: 2.8rem; margin-bottom: .5rem; background: linear-gradient(90deg, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
.coversheet p { color: var(--muted); font-size: 1.1rem; }

/* ── Card grid ─────────────────────────── */
.card-grid { display: flex; flex-wrap: wrap; gap: 1rem; margin-bottom: 1.5rem; }
.card-grid .card-item { flex: 1 1 280px; max-width: 360px; background: var(--card-bg); border: 1px solid var(--border); border-radius: 10px; padding: 1.2rem; transition: border-color .2s; }
.card-grid .card-item:hover { border-color: var(--accent-blue); }

/* ── Standalone card ───────────────────── */
.card-standalone { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }

/* Left-accent card (takeaways) */
.card-accent-left { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; padding: 1.5rem; margin-bottom: 1rem; }

/* ── Section heading ───────────────────── */
.section-heading { font-size: 1.4rem; color: var(--accent-blue); border-bottom: 2px solid var(--border); padding-bottom: .4rem; margin: 2rem 0 1rem; display: flex; align-items: center; gap: .5rem; }

/* ── Badges ────────────────────────────── */
.badge { display: inline-block; padding: .15rem .55rem; border-radius: 99px; font-size: .72rem; font-weight: 600; text-transform: uppercase; letter-spacing: .04em; vertical-align: middle; margin-left: .4rem; }
.badge-blue   { background: #1c3a5f; color: var(--accent-blue); }
.badge-green  { background: #1a3d2e; color: var(--accent-green); }
.badge-orange { background: #3d3410; color: var(--accent-orange); }
.badge-red    { background: #3d1c1c; color: var(--accent-red); }
.badge-purple { background: #2e1a4d; color: var(--accent-purple); }
.badge-cyan   { background: #0f3d3d; color: var(--accent-cyan); }

/* ── Colored text ──────────────────────── */
.accent-green  { color: var(--accent-green); }
.accent-blue   { color: var(--accent-blue); }
.accent-purple { color: var(--accent-purple); }
.accent-orange { color: var(--accent-orange); }
.accent-red    { color: var(--accent-red); }
.accent-cyan   { color: var(--accent-cyan); }
.accent-pink   { color: var(--accent-pink); }
.score-great  { color: var(--accent-green); font-weight: 600; }
.score-good   { color: var(--accent-blue); font-weight: 500; }
.score-meh    { color: var(--accent-orange); }
.score-bad    { color: var(--accent-red); }

/* ── Code ──────────────────────────────── */
code { background: #0d1117; padding: .15rem .45rem; border-radius: 4px; font-family: 'Cascadia Code', 'Fira Code', 'SF Mono', Consolas, monospace; font-size: .88rem; color: var(--accent-green); border: 1px solid var(--border); }
pre { background: #0d1117; padding: .9rem 1rem; border-radius: 6px; margin: .5rem 0; overflow-x: auto; border: 1px solid var(--border); }
pre code { background: none; border: none; padding: 0; display: block; font-size: .85rem; line-height: 1.7; }

/* ── Mini grid (quick tips) ───────────── */
.mini-grid { display: flex; flex-wrap: wrap; gap: .6rem; margin-top: .5rem; }
.mini-item { flex: 1 1 200px; background: #0d1117; padding: .4rem .8rem; border-radius: 6px; border: 1px solid var(--border); font-size: .88rem; }

/* ── Boxes ─────────────────────────────── */
.note { background: rgba(88,166,255,.08); border-left: 3px solid var(--accent-blue); padding: .7rem 1rem; margin-top: .6rem; border-radius: 0 6px 6px 0; font-size: .9rem; color: var(--muted); }
.note strong { color: var(--accent-blue); }
.tip-box { border-left: 4px solid var(--accent-orange); background: rgba(210,153,34,.08); padding: .8rem 1rem; border-radius: 0 8px 8px 0; margin-bottom: 1rem; font-size: .86rem; }
.warning-box { border-left: 4px solid var(--accent-red); background: rgba(248,81,73,.06); padding: .8rem 1rem; border-radius: 0 8px 8px 0; margin-bottom: 1rem; font-size: .86rem; }

/* ── Tables ────────────────────────────── */
.bench-table, .task-table { width: 100%; border-collapse: collapse; margin-bottom: 1.2rem; font-size: .85rem; }
.bench-table th, .task-table th { text-align: left; padding: .6rem .8rem; background: var(--card-bg); color: var(--accent-blue); border-bottom: 2px solid var(--border); font-size: .78rem; text-transform: uppercase; letter-spacing: .05em; }
.bench-table td, .task-table td { padding: .5rem .8rem; border-bottom: 1px solid var(--border); vertical-align: top; }
.bench-table tr:hover, .task-table tr:hover { background: rgba(88,166,255,.04); }

/* ── Bar chart ─────────────────────────── */
.chart-row { display: flex; align-items: center; gap: .6rem; margin-bottom: .35rem; font-size: .84rem; }
.chart-label { width: 110px; text-align: right; flex-shrink: 0; color: var(--muted); font-weight: 500; }
.chart-bar-bg { width: calc(100% - 150px); height: 22px; background: #21262d; border-radius: 4px; overflow: hidden; position: relative; }
.chart-bar-fill { height: 100%; border-radius: 4px; display: flex; align-items: center; justify-content: flex-end; padding-right: .5rem; font-size: .75rem; font-weight: 600; color: #fff; min-width: 2em; }
.chart-desc { font-size: .82rem; color: var(--muted); margin-left: 125px; }

/* ── Flow / decision steps ────────────── */
.flow { position: relative; padding-left: 1.5rem; margin-bottom: 1.2rem; }
.flow-item { margin-bottom: .8rem; padding-left: 1rem; position: relative; font-size: .88rem; }
.flow-item::before { content: attr(data-num); position: absolute; left: -.35rem; top: 0; color: var(--accent-orange); font-weight: 700; font-size: .9rem; }
.flow-connector { position: absolute; left: .25rem; top: 1.1rem; bottom: -.6rem; width: 2px; background: var(--border); }

/* ── Two-col layout ───────────────────── */
.two-col { display: flex; flex-wrap: wrap; gap: 1rem; }
.two-col > * { flex: 1 1 300px; }

/* ── Model tag ────────────────────────── */
.model-tag { display: inline-block; padding: .1rem .45rem; border-radius: 4px; font-size: .75rem; font-weight: 600; background: rgba(88,166,255,.12); color: var(--accent-blue); margin-right: .3rem; vertical-align: middle; }

/* ── Credits / footer ─────────────────── */
.credits { text-align: center; margin-top: 2rem; color: var(--muted); font-size: .8rem; }
.credits a { color: var(--accent-blue); text-decoration: underline; }

/* ── Print ─────────────────────────────── */
@media print {
  body { background: white; color: black; padding: 1rem; }
  .card-grid .card-item, .card-standalone, .card-accent-left { break-inside: avoid; border: 1px solid #ccc; background: white !important; }
  code, pre, .note, .mini-item { color: #333 !important; border-color: #ccc; background: #f8f8f8 !important; }
  h1 .icon, .accent-green, .accent-blue, .accent-purple, .accent-orange, .accent-red, .accent-cyan, .accent-pink { color: #333 !important; }
}

/* ── Utility ───────────────────────────── */
.mt-1  { margin-top: .5rem; }
.mt-2  { margin-top: 1rem; }
.mt-3  { margin-top: 1.5rem; }
.mb-1  { margin-bottom: .5rem; }
.mb-2  { margin-bottom: 1rem; }
</style>
</head>
<body{% if page.body-class %} class="{{ page.body-class }}"{% endif %}>

{{ content }}

</body>
</html>
