<style>
:root { --bg: #0d1117; --text: #e6edf3; --muted: #8b949e; --accent-blue: #58a6ff; --accent-purple: #bc8cff; --border: #30363d; }
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', -apple-system, BlinkMacSystemFont, sans-serif; background: var(--bg); color: var(--text); line-height: 1.6; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 2rem; }
.index-page h1 { font-size: 2.4rem; margin-bottom: .5rem; background: linear-gradient(135deg, var(--accent-blue), var(--accent-purple)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

.cards { display: flex; gap: 1.5rem; flex-wrap: wrap; justify-content: center; max-width: 800px; }
.card { background: #161b22; border: 1px solid var(--border); border-radius: 12px; padding: 2rem 2.5rem; text-decoration: none; color: var(--text); transition: border-color .2s, transform .15s; min-width: 280px; text-align: center; }
.card:hover { border-color: var(--accent-blue); transform: translateY(-3px); }
.card .icon { font-size: 2.5rem; margin-bottom: .75rem; }
.card h2 { font-size: 1.2rem; margin-bottom: .4rem; }
.card p { color: var(--muted); font-size: .9rem; }
</style>
</head>
